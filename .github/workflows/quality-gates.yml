name: quality-gates

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    name: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Policy checks
        run: node scripts/ci/require-tests-and-docs.mjs

      - name: Verify commands
        run: bash .codex/scripts/run_verify_commands.sh

      - name: Diff coverage
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "coverage/lcov.info not present; skipping diff coverage"
            exit 0
          fi

          compare_branch="origin/${GITHUB_BASE_REF:-master}"
          if ! git rev-parse --verify "$compare_branch" >/dev/null 2>&1; then
            compare_branch="origin/master"
          fi

          python -m pip install --upgrade pip diff-cover
          diff-cover coverage/lcov.info --compare-branch="$compare_branch" --fail-under=90

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            coverage/
